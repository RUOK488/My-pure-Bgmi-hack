name: Build BGMI Hack

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Compile
      run: |
        clang -dynamiclib -arch arm64 -framework Foundation -framework UIKit -o MyHack.dylib my_pure_hack.c
        ls -la MyHack.dylib
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MyHack
        path: MyHack.dylib
